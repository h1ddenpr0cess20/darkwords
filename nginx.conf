server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Same-origin proxy for the Anthropic Files API, which doesn't answer
    # CORS preflights — code-interpreter file outputs are downloaded through
    # here rather than straight from the browser. Mirrors vite.config.ts
    # (dev) and vercel.json.
    location /anthropic/ {
        proxy_pass https://api.anthropic.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.anthropic.com;
        proxy_buffering off;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
